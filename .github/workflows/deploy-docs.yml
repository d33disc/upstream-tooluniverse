name: Deploy ToolUniverse Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ToolUniverse/docs/**'
      - 'ToolUniverse/src/**'
      - 'ToolUniverse/pyproject.toml'
      - 'ToolUniverse/.github/workflows/deploy-docs.yml'
      - 'ToolUniverse/validate_simple.py'
      - 'ToolUniverse/quick_doc_build.sh'
      - 'ToolUniverse/build_docs.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package with all documentation dependencies
        pip install -e .[docs]
        # Verify all extensions are available
        python -c "import sphinx_copybutton, sphinx_tabs, sphinx_design, notfound.extension; print('✅ All Sphinx extensions installed')"

    - name: Validate documentation code examples
      run: |
        python -c "import sphinx; print(f'Sphinx version: {sphinx.__version__}')"
        ls -la docs/
        # Run code validation before building
        if [ -f "validate_simple.py" ]; then
          echo "🔍 Validating documentation code examples..."
          python validate_simple.py
          echo "✅ Code validation completed"
        fi

    - name: Build documentation with enhanced script
      run: |
        # Use our enhanced build script if available, fallback to standard make
        if [ -f "quick_doc_build.sh" ]; then
          echo "🚀 Using enhanced documentation build script..."
          chmod +x quick_doc_build.sh
          ./quick_doc_build.sh
        else
          echo "📚 Using standard Sphinx build..."
          cd docs
          make clean
          make html
        fi

    - name: Check build output and validation results
      run: |
        ls -la docs/_build/html/
        test -f docs/_build/html/index.html || (echo "❌ index.html not found!" && exit 1)

        # Check for validation report if available
        if [ -f "validation_report.txt" ]; then
          echo "📊 Validation Report:"
          cat validation_report.txt
        fi

        # Count built files for reporting
        html_count=$(find docs/_build/html -name "*.html" | wc -l)
        echo "📈 Built $html_count HTML files"

    - name: Add .nojekyll file
      run: |
        touch docs/_build/html/.nojekyll

    - name: Create CNAME file for custom domain
      run: |
        echo "zitniklab.hms.harvard.edu" > docs/_build/html/CNAME

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs/_build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  test-deployment:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()

    steps:
    - name: Report deployment status with enhanced feedback
      run: |
        if [[ "${{ needs.build-and-deploy.result }}" == "success" ]]; then
          echo "✅ Documentation deployment successful!"
          echo "📖 Documentation should be available at: https://zitniklab.hms.harvard.edu/bioagent/"
          echo "🔗 Alternative URL: https://[github-username].github.io/ToolUniverse/"
          echo ""
          echo "🎯 Enhanced Features Available:"
          echo "   - Code validation system ✅"
          echo "   - Reorganized user guide structure ✅"
          echo "   - Quick start examples ✅"
          echo "   - Comprehensive troubleshooting ✅"
        else
          echo "❌ Documentation deployment failed!"
          echo "Build status: ${{ needs.build-and-deploy.result }}"
          echo ""
          echo "🔍 Troubleshooting steps:"
          echo "   1. Check code validation errors in logs"
          echo "   2. Verify Sphinx build output"
          echo "   3. Ensure all documentation dependencies are installed"
          exit 1
        fi
