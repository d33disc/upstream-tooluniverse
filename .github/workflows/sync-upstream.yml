name: Sync with Upstream

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (check only, do not push)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    name: Sync mims-harvard/ToolUniverse → main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          # Full history is required so we can compare with upstream
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/mims-harvard/ToolUniverse.git
          git fetch upstream main --no-tags

      - name: Determine sync status
        id: status
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse origin/main)

          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "local_sha=$LOCAL_SHA"       >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "in_sync=true"  >> "$GITHUB_OUTPUT"
            echo "✅ Already in sync with upstream (${UPSTREAM_SHA:0:7})"
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
            BEHIND=$(git rev-list --count "origin/main..upstream/main")
            echo "commits_behind=$BEHIND" >> "$GITHUB_OUTPUT"
            echo "🔄 Fork is ${BEHIND} commit(s) behind upstream"
          fi

      - name: Nothing to do
        if: steps.status.outputs.in_sync == 'true'
        run: echo "Fork is already up-to-date. Exiting."

      # ------------------------------------------------------------------ #
      # Collect the diff summary (commits + files) before any merge.        #
      # These outputs are used in PR bodies for both the fast-forward and   #
      # the conflict-PR paths.                                               #
      # ------------------------------------------------------------------ #
      - name: Build diff summary
        if: steps.status.outputs.in_sync == 'false'
        id: diff
        run: |
          # --- New commits coming in from upstream ---
          COMMIT_LOG=$(git log \
            --oneline \
            --no-merges \
            "origin/main..upstream/main" \
            | head -50 \
            | sed 's/^/  - /')

          # --- Files changed between our main and upstream/main ---
          CHANGED_FILES=$(git diff \
            --name-status \
            "origin/main" "upstream/main" \
            | head -100 \
            | awk '
              /^A/ { printf "  - ➕ `%s`\n", $2 }
              /^D/ { printf "  - ➖ `%s`\n", $2 }
              /^M/ { printf "  - ✏️  `%s`\n", $2 }
              /^R/ { printf "  - 🔀 `%s` → `%s`\n", $2, $3 }
            ')

          # GitHub Actions multiline outputs require a unique delimiter
          {
            echo "commit_log<<EOF_COMMIT_LOG"
            echo "$COMMIT_LOG"
            echo "EOF_COMMIT_LOG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "changed_files<<EOF_CHANGED_FILES"
            echo "$CHANGED_FILES"
            echo "EOF_CHANGED_FILES"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # Happy path: upstream is a strict ancestor of our local HEAD → just  #
      # fast-forward merge and push directly to main.                       #
      # ------------------------------------------------------------------ #
      - name: Fast-forward merge (no conflicts)
        if: steps.status.outputs.in_sync == 'false' && inputs.dry_run != true
        id: ff_merge
        run: |
          git checkout main

          if git merge --ff-only upstream/main 2>/dev/null; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Fast-forward successful"
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Fast-forward not possible — diverged history. Will open a PR."
          fi

      - name: Push fast-forward merge to main
        if: |
          steps.status.outputs.in_sync == 'false' &&
          steps.ff_merge.outputs.merged == 'true'  &&
          inputs.dry_run != true
        run: git push origin main

      # ------------------------------------------------------------------ #
      # Fallback: histories have diverged → create a PR so the maintainer  #
      # can review diffs and resolve any conflicts.                         #
      # ------------------------------------------------------------------ #
      - name: Check for existing sync PR
        if: |
          steps.status.outputs.in_sync == 'false' &&
          steps.ff_merge.outputs.merged == 'false' &&
          inputs.dry_run != true
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list \
            --base main \
            --label upstream-sync \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "pr_number=${OPEN}" >> "$GITHUB_OUTPUT"
          if [ -n "$OPEN" ]; then
            echo "ℹ️  Existing sync PR #${OPEN} already open — skipping creation."
          fi

      - name: Create sync branch and open PR
        if: |
          steps.status.outputs.in_sync == 'false' &&
          steps.ff_merge.outputs.merged == 'false' &&
          steps.existing_pr.outputs.pr_number == '' &&
          inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          # ---- Attempt the merge ----------------------------------------
          HAS_CONFLICTS=false
          if git merge upstream/main \
               --no-edit \
               -m "chore: sync with upstream mims-harvard/ToolUniverse"; then
            echo "✅ Merge succeeded with no conflicts."
          else
            HAS_CONFLICTS=true
            echo "⚠️  Merge conflicts detected. Staging conflict markers."

            # Collect the list of conflicting files before we stage them
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U | sed 's/^/  - `/' | sed 's/$/`/')
            CONFLICT_FILE_COUNT=$(git diff --name-only --diff-filter=U | wc -l | tr -d ' ')

            # Stage everything (including conflict markers) so the diff is visible in the PR
            git add -A
            git commit -m "chore: sync with upstream (conflict markers included — resolve before merging)"
          fi

          git push origin "$BRANCH"

          # ---- Build the PR labels list ---------------------------------
          LABELS="upstream-sync"
          if [ "$HAS_CONFLICTS" = "true" ]; then
            LABELS="upstream-sync,conflicts"
          fi

          # ---- Build the conflict section (only shown when relevant) ----
          if [ "$HAS_CONFLICTS" = "true" ]; then
            CONFLICT_SECTION="## ⚠️ Merge Conflicts

          The following **${CONFLICT_FILE_COUNT}** file(s) have conflict markers that must be resolved before merging:

          ${CONFLICT_FILES}

          **How to resolve:**
          \`\`\`bash
          git fetch origin
          git checkout ${BRANCH}
          # open each file above, find <<<<<<< / ======= / >>>>>>> markers, edit, then:
          git add <file>
          git commit
          git push
          \`\`\`

          "
          else
            CONFLICT_SECTION=""
          fi

          # ---- Build the PR body ----------------------------------------
          PR_BODY="## 🔄 Automated Upstream Sync

          This PR brings in **${{ steps.status.outputs.commits_behind }} new commit(s)** from \
          [mims-harvard/ToolUniverse](https://github.com/mims-harvard/ToolUniverse/commits/main).

          | | |
          |---|---|
          | **Upstream SHA** | \`${{ steps.status.outputs.upstream_sha }}\` |
          | **Local SHA** | \`${{ steps.status.outputs.local_sha }}\` |
          | **Commits behind** | ${{ steps.status.outputs.commits_behind }} |

          ${CONFLICT_SECTION}
          ## 📋 New Commits

          ${{ steps.diff.outputs.commit_log }}

          ## 📂 Files Changed

          ${{ steps.diff.outputs.changed_files }}

          ## ✅ What to do

          1. Review the commits and file diffs listed above (and in the **Files changed** tab).
          2. If conflicts are flagged, resolve them using the instructions above.
          3. Merge when satisfied.

          > _Opened automatically by the [Sync with Upstream](${{ github.server_url }}/${{ github.repository }}/actions/workflows/sync-upstream.yml) workflow._"

          gh pr create \
            --title "chore: sync with upstream mims-harvard/ToolUniverse" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH" \
            --label "$LABELS"

      # ------------------------------------------------------------------ #
      # Dry-run summary                                                     #
      # ------------------------------------------------------------------ #
      - name: Dry-run summary
        if: inputs.dry_run == true
        run: |
          echo "=== DRY RUN SUMMARY ==="
          echo "Upstream SHA  : ${{ steps.status.outputs.upstream_sha }}"
          echo "Local SHA     : ${{ steps.status.outputs.local_sha }}"
          echo "In sync       : ${{ steps.status.outputs.in_sync }}"
          echo "Commits behind: ${{ steps.status.outputs.commits_behind }}"
          echo ""
          echo "=== INCOMING COMMITS ==="
          echo "${{ steps.diff.outputs.commit_log }}"
          echo ""
          echo "=== CHANGED FILES ==="
          echo "${{ steps.diff.outputs.changed_files }}"
