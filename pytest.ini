[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers --strict-config --maxfail=1 --disable-warnings --cov=tooluniverse --cov-report=term-missing:skip-covered -m "not slow and not require_api_keys"
testpaths = 
    tests/unit
    tests/integration
    tests/tools
    tests/api
pythonpath = src
filterwarnings =
    error::DeprecationWarning:tooluniverse.*
    ignore::DeprecationWarning
markers =
    unit: fast, isolated unit tests
    integration: network or external-resource tests
    slow: long-running tests (use with -m "not slow")
    require_api_keys: tests requiring API keys
    legacy: legacy tests kept for reference
    asyncio: tests that use pytest-asyncio for event loop handling
timeout = 30

